[alembic]
# Ruta a la carpeta de migraciones que creaste
script_location = alembic

# Esta línea es para que alembic encuentre tu base de datos
# Cambia los datos por los tuyos: usuario, password, host y nombre de db
sqlalchemy.url = postgresql://medussa_user:secure_password@localhost:5432/medussa_erp

# ... (mantén tu [alembic] y sqlalchemy.url arriba)

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S